<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ffffff;
            --accent: #8a2be2;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #120e1f, #000000, #1a0b2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--primary);
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efeito de Pulso para o Modo Imersão */
        .pulse-active {
            animation: pulseBeat 2s infinite alternate !important;
        }

        @keyframes pulseBeat {
            0% { box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.2); }
            100% { box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.6); }
        }

        .player-container {
            width: 350px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.5s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .header i {
            cursor: pointer;
            transition: color 0.3s;
        }

        .header i:hover {
            color: var(--accent);
        }

        .album-art {
            width: 100%;
            height: 290px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            position: relative;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .song-info {
            text-align: center;
            margin-bottom: 25px;
        }

        .song-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .song-artist {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .progress-container {
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 5px;
            position: relative;
            transition: width 0.1s linear;
        }

        .progress::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -4px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls i {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .controls i:hover {
            color: #fff;
        }

        .play-pause {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }

        .play-pause i {
            font-size: 1.5rem;
            color: #fff;
        }

        .play-pause:hover {
            transform: scale(1.05);
            background: #9d4edd;
        }

        /* Notificação Toast de Inovação */
        #toast {
            position: fixed;
            top: 20px;
            background: rgba(138, 43, 226, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="toast">Modo Imersão Ativado!</div>

    <div class="player-container" id="playerUi">
        <div class="header">
            <i class="fas fa-chevron-down"></i>
            <span>TOCANDO AGORA</span>
            <i class="fas fa-magic" id="magicBtn" title="Modo Imersão" onclick="toggleImmersion()"></i>
        </div>

        <div class="album-art">
            <img id="cover" src="" alt="Capa do Álbum">
        </div>

        <div class="song-info">
            <div class="song-title" id="title">Carregando...</div>
            <div class="song-artist" id="artist">Aguarde</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-container">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <i class="fas fa-random" id="shuffle"></i>
            <i class="fas fa-step-backward" id="prev"></i>
            <div class="play-pause" id="play">
                <i class="fas fa-play" id="play-icon"></i>
            </div>
            <i class="fas fa-step-forward" id="next"></i>
            <i class="fas fa-list" id="playlist-btn"></i>
        </div>

        <audio id="audio"></audio>
    </div>

    <script>
        // Músicas de demonstração (Livres de direitos para o teste)
        const songs = [
            {
                title: "Cyber City",
                artist: "Synthwave Beats",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=400&q=80"
            },
            {
                title: "Urban Nights",
                artist: "Jazz Chillout",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=400&q=80"
            },
            {
                title: "Deep Focus",
                artist: "Lo-Fi Study",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                cover: "https://images.unsplash.com/photo-1518609878373-06d740f60d8b?auto=format&fit=crop&w=400&q=80"
            }
        ];

        let songIndex = 0;
        let isPlaying = false;
        let isImmersion = false;

        // Elementos do DOM
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const playIcon = document.getElementById('play-icon');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const cover = document.getElementById('cover');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        // Carregar música inicial
        loadSong(songs[songIndex]);

        function loadSong(song) {
            title.innerText = song.title;
            artist.innerText = song.artist;
            cover.src = song.cover;
            audio.src = song.src;
        }

        // Tocar a música
        function playSong() {
            isPlaying = true;
            playIcon.classList.remove('fa-play');
            playIcon.classList.add('fa-pause');
            audio.play();
        }

        // Pausar a música
        function pauseSong() {
            isPlaying = false;
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play');
            audio.pause();
        }

        // Evento de Play/Pause
        playBtn.addEventListener('click', () => {
            isPlaying ? pauseSong() : playSong();
        });

        // Música Anterior
        prevBtn.addEventListener('click', () => {
            songIndex--;
            if (songIndex < 0) songIndex = songs.length - 1;
            loadSong(songs[songIndex]);
            playSong();
        });

        // Próxima Música
        nextBtn.addEventListener('click', () => {
            songIndex++;
            if (songIndex > songs.length - 1) songIndex = 0;
            loadSong(songs[songIndex]);
            playSong();
        });

        // Atualizar barra de progresso
        audio.addEventListener('timeupdate', (e) => {
            const { duration, currentTime } = e.srcElement;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;

            // Formatar tempo
            let currentMinutes = Math.floor(currentTime / 60);
            let currentSeconds = Math.floor(currentTime % 60);
            if (currentSeconds < 10) currentSeconds = `0${currentSeconds}`;
            currentTimeEl.innerText = `${currentMinutes}:${currentSeconds}`;

            if (duration) {
                let durationMinutes = Math.floor(duration / 60);
                let durationSeconds = Math.floor(duration % 60);
                if (durationSeconds < 10) durationSeconds = `0${durationSeconds}`;
                durationEl.innerText = `${durationMinutes}:${durationSeconds}`;
            }
        });

        // Clicar na barra de progresso
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        // Auto-play próxima música quando acabar
        audio.addEventListener('ended', () => {
            nextBtn.click();
        });

        // Função de Inovação: Modo Imersão
        function toggleImmersion() {
            const playerUi = document.getElementById('playerUi');
            const toast = document.getElementById('toast');
            
            isImmersion = !isImmersion;
            
            if (isImmersion) {
                playerUi.classList.add('pulse-active');
                toast.innerText = "Modo Imersão Ativado!";
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 2000);
            } else {
                playerUi.classList.remove('pulse-active');
                toast.innerText = "Modo Padrão";
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 2000);
            }
        }
    </script>
</body>
</html>
